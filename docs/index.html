<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌧️ Floodometer Brazil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0a0a;
            --bg-panel: #1a1a2e;
            --bg-card: #16213e;
            --accent: #e94560;
            --text: #fff;
            --text-dim: #aaa;
            --risk-red: #ff4444;
            --risk-orange: #ff8800;
            --risk-yellow: #ffcc00;
            --risk-green: #00cc66;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
        }
        
        header {
            background: var(--bg-panel);
            padding: 10px 15px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .logo {
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .header-stats {
            display: flex;
            gap: 8px;
            font-size: 0.75rem;
            flex-wrap: wrap;
        }
        
        .stat {
            padding: 3px 8px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
        }
        
        .stat.red { background: rgba(255,68,68,0.2); color: var(--risk-red); }
        .stat.orange { background: rgba(255,136,0,0.2); color: var(--risk-orange); }
        .stat.yellow { background: rgba(255,204,0,0.2); color: var(--risk-yellow); }
        .stat.green { background: rgba(0,204,102,0.2); color: var(--risk-green); }
        
        .toggle-btn {
            display: none;
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        
        #map { height: calc(100vh - 50px); width: 100%; }
        
        .legend {
            background: rgba(26, 26, 46, 0.95);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            font-size: 0.75rem;
        }
        
        .legend h4 { margin-bottom: 5px; color: var(--accent); }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 3px 0;
        }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        
        .dot.red { background: var(--risk-red); }
        .dot.orange { background: var(--risk-orange); }
        .dot.yellow { background: var(--risk-yellow); }
        .dot.green { background: var(--risk-green); }
        
        @media (max-width: 768px) {
            .toggle-btn { display: block; }
            
            #map { height: 100vh; width: 100%; }
            
            header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 1000;
            }
            
            #map { margin-top: 50px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🌧️ Floodometer</div>
        <div class="header-stats" id="headerStats"></div>
    </header>
    
    <div id="map"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-14.235, -51.925], 4);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        
        const icons = {
            red: L.divIcon({ html: '<div class="dot red" style="width:14px;height:14px;background:var(--risk-red);border-radius:50%;box-shadow:0 0 8px var(--risk-red)"></div>', iconSize: [14, 14] }),
            orange: L.divIcon({ html: '<div class="dot orange" style="width:14px;height:14px;background:var(--risk-orange);border-radius:50%;box-shadow:0 0 8px var(--risk-orange)"></div>', iconSize: [14, 14] }),
            yellow: L.divIcon({ html: '<div class="dot yellow" style="width:14px;height:14px;background:var(--risk-yellow);border-radius:50%;box-shadow:0 0 8px var(--risk-yellow)"></div>', iconSize: [14, 14] }),
            green: L.divIcon({ html: '<div class="dot green" style="width:14px;height:14px;background:var(--risk-green);border-radius:50%;box-shadow:0 0 8px var(--risk-green)"></div>', iconSize: [14, 14] })
        };
        
        let floodData = null;
        let forecastData = null;
        
        async function loadData() {
            try {
                floodData = await (await fetch('data.json')).json();
            } catch(e) { floodData = { states: {} }; }
            
            try {
                forecastData = await (await fetch('forecast.json')).json();
            } catch(e) { forecastData = { cities: [] }; }
            
            renderAll();
        }
        
        function getForecast(cityName, stateCode) {
            if (!forecastData?.cities) return null;
            return forecastData.cities.find(c => 
                c.name.toLowerCase().includes(cityName.toLowerCase()) ||
                cityName.toLowerCase().includes(c.name.toLowerCase())
            );
        }
        
        function getRisk(historical, forecast) {
            const order = { green: 0, yellow: 1, orange: 2, red: 3 };
            const f = forecast?.overall_risk || 'green';
            const h = historical || 'green';
            return order[f] >= order[h] ? f : h;
        }
        
        function renderAll() {
            let stats = { red: 0, orange: 0, yellow: 0, green: 0 };
            const markers = [];
            
            // States
            for (const [code, state] of Object.entries(floodData.states || {})) {
                for (const [cityKey, city] of Object.entries(state.cities || {})) {
                    const forecast = getForecast(city.name, code);
                    const risk = getRisk(city.risk, forecast);
                    stats[risk] = (stats[risk] || 0) + 1;
                    
                    // Add neighborhood stats
                    (city.neighborhoods || []).forEach(n => {
                        stats[n.risk] = (stats[n.risk] || 0) + 1;
                    });
                    
                    // Add marker
                    const icon = icons[risk] || icons.green;
                    L.marker([city.lat, city.lng], { icon })
                        .bindPopup(`<b>${city.name}</b><br>Risk: ${risk.toUpperCase()}${forecast ? '<br>🌧️ ' + forecast.precip_24h.toFixed(1) + 'mm' : ''}`)
                        .addTo(map);
                }
            }
            
            // Header stats
            document.getElementById('headerStats').innerHTML = 
                `<span class="stat red">🔴 ${stats.red||0}</span>` +
                `<span class="stat orange">🟠 ${stats.orange||0}</span>` +
                `<span class="stat yellow">🟡 ${stats.yellow||0}</span>` +
                `<span class="stat green">🟢 ${stats.green||0}</span>`;
        }
        
        // Legend
        L.control({ position: 'bottomright' }).onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <h4>Risk Level</h4>
                <div class="legend-item"><span class="dot red"></span> Critical</div>
                <div class="legend-item"><span class="dot orange"></span> High</div>
                <div class="legend-item"><span class="dot yellow"></span> Warning</div>
                <div class="legend-item"><span class="dot green"></span> Safe</div>
            `;
            return div;
        }.addTo(map);
        
        loadData();
    </script>
</body>
</html>
