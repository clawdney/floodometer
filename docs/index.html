<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌧️ Floodometer Brazil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #fff; }
        
        header { background: #1a1a2e; padding: 10px 15px; border-bottom: 2px solid #e94560; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 1.1rem; font-weight: bold; }
        .header-stats { display: flex; gap: 8px; font-size: 0.75rem; flex-wrap: wrap; }
        .stat { padding: 3px 8px; border-radius: 12px; background: rgba(255,255,255,0.1); }
        .stat.red { background: rgba(255,68,68,0.2); color: #ff4444; }
        .stat.orange { background: rgba(255,136,0,0.2); color: #ff8800; }
        .stat.yellow { background: rgba(255,204,0,0.2); color: #ffcc00; }
        .stat.green { background: rgba(0,204,102,0.2); color: #00cc66; }
        
        #map { height: calc(100vh - 50px); width: 100%; }
        
        .legend { background: rgba(26,26,46,0.95); padding: 10px; border-radius: 8px; border: 1px solid #444; font-size: 0.75rem; }
        .legend h4 { margin-bottom: 5px; color: #e94560; }
        .legend-item { display: flex; align-items: center; gap: 5px; margin: 3px 0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.red { background: #ff4444; }
        .dot.orange { background: #ff8800; }
        .dot.yellow { background: #ffcc00; }
        .dot.green { background: #00cc66; }
        
        .warning-badge { background: #ff4444; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; }
        
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #1a1a2e; padding: 20px; border-radius: 10px; z-index: 1000; }
        
        @media (max-width: 768px) {
            #map { height: 100vh; }
            header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
            #map { margin-top: 50px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🌧️ Floodometer</div>
        <div class="header-stats" id="headerStats">
            <span class="stat red">🔴 0</span>
            <span class="stat orange">🟠 0</span>
            <span class="stat yellow">🟡 0</span>
            <span class="stat green">🟢 0</span>
        </div>
    </header>
    
    <div id="loading">🌧️ Carregando alertas...</div>
    <div id="map"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-14.235, -51.925], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(map);
        
        // Icons
        const icons = {
            red: L.divIcon({ html: '<div style="width:20px;height:20px;background:#ff4444;border-radius:50%;box-shadow:0 0 12px #ff4444;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:bold">!</div>', iconSize: [20, 20], iconAnchor: [10, 10] }),
            orange: L.divIcon({ html: '<div style="width:18px;height:18px;background:#ff8800;border-radius:50%;box-shadow:0 0 10px #ff8800;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:bold">!</div>', iconSize: [18, 18], iconAnchor: [9, 9] }),
            yellow: L.divIcon({ html: '<div style="width:14px;height:14px;background:#ffcc00;border-radius:50%;box-shadow:0 0 8px #ffcc00"></div>', iconSize: [14, 14], iconAnchor: [7, 7] }),
            green: L.divIcon({ html: '<div style="width:12px;height:12px;background:#00cc66;border-radius:50%;box-shadow:0 0 6px #00cc66"></div>', iconSize: [12, 12], iconAnchor: [6, 6] })
        };
        
        // Calculate risk from precipitation
        function calcRisk(precipMm) {
            if (precipMm > 50) return 'red';
            if (precipMm > 30) return 'orange';
            if (precipMm > 10) return 'yellow';
            return 'green';
        }
        
        // City codes for AccuWeather
        const cityCodes = {
            "Porto Alegre": "4564",
            "Canoas": "4571", 
            "Lajeado": "126769",
            "Rio de Janeiro": "4544",
            "Niterói": "10733",
            "São Paulo": "45881",
            "Campinas": "45883",
            "Belo Horizonte": "4607",
            "Curitiba": "4611",
            "Recife": "4245",
            "Salvador": "4242",
            "Fortaleza": "4243",
            "Manaus": "3944",
            "Brasília": "15482",
            "Vitória": "4605",
            "Goiânia": "8108",
            "Natal": "4256",
            "Belém": "4238",
            "Florianópolis": "4622",
            "Blumenau": "10236"
        };
        
        // Cities with precipitation data (Open-Meteo)
        const cities = [
            { name: "Porto Alegre", lat: -30.0346, lng: -51.2177, precip: 6.8 },
            { name: "Canoas", lat: -29.9177, lng: -51.1836, precip: 4.4 },
            { name: "Lajeado", lat: -29.1167, lng: -51.9667, precip: 8.2 },
            { name: "Rio de Janeiro", lat: -22.9068, lng: -43.1729, precip: 4.4 },
            { name: "Niterói", lat: -22.8833, lng: -43.1036, precip: 0.0 },
            { name: "São Paulo", lat: -23.5505, lng: -46.6333, precip: 5.5 },
            { name: "Campinas", lat: -22.9099, lng: -47.0626, precip: 12.7 },
            { name: "Belo Horizonte", lat: -19.9167, lng: -43.9345, precip: 0.6 },
            { name: "Curitiba", lat: -25.4284, lng: -49.2733, precip: 0.2 },
            { name: "Recife", lat: -8.0476, lng: -34.877, precip: 1.3 },
            { name: "Salvador", lat: -12.9714, lng: -38.5014, precip: 2.1 },
            { name: "Fortaleza", lat: -3.7172, lng: -38.5433, precip: 0.0 },
            { name: "Manaus", lat: -3.119, lng: -60.0217, precip: 13.1 },
            { name: "Brasília", lat: -15.8267, lng: -47.9218, precip: 0.5 },
            { name: "Vitória", lat: -20.3155, lng: -40.3128, precip: 2.1 },
            { name: "Goiânia", lat: -16.6799, lng: -49.255, precip: 1.2 },
            { name: "Natal", lat: -5.7945, lng: -35.211, precip: 0.0 },
            { name: "Belém", lat: -1.4558, lng: -48.5039, precip: 0.0 },
            { name: "Florianópolis", lat: -27.5954, lng: -48.548, precip: 0.5 },
            { name: "Blumenau", lat: -26.9194, lng: -49.0661, precip: 7.7 }
        ];
        
        // Fetch AccuWeather alerts
        async function fetchAccuWeatherAlerts(cityName, code) {
            try {
                const url = `https://www.accuweather.com/en/br/${cityName.toLowerCase().replace(/ /g, '-')}/${code}/weather-forecast/${code}`;
                const response = await fetch(url);
                const text = await response.text();
                
                // Check for hasAlerts
                if (text.includes('"hasAlerts":true')) {
                    // Check for flood alerts
                    if (text.includes('"alertscategory":"FLOOD') || text.includes('alertscategory":"FLOOD')) {
                        return { hasAlerts: true, type: 'FLOOD' };
                    }
                    return { hasAlerts: true, type: 'OTHER' };
                }
            } catch (e) {
                console.error('Error fetching', cityName, e);
            }
            return { hasAlerts: false };
        }
        
        // Main render
        async function init() {
            let stats = { red: 0, orange: 0, yellow: 0, green: 0 };
            const alertsFound = [];
            
            // Fetch alerts for all cities
            for (const city of cities) {
                const code = cityCodes[city.name];
                if (code) {
                    const alerts = await fetchAccuWeatherAlerts(city.name, code);
                    if (alerts.hasAlerts) {
                        city.accuweatherAlert = alerts;
                        alertsFound.push(city.name);
                        console.log('⚠️ Alert:', city.name, alerts.type);
                    }
                }
            }
            
            // Render markers
            cities.forEach(city => {
                let risk;
                
                // AccuWeather alerts override forecast
                if (city.accuweatherAlert && city.accuweatherAlert.type === 'FLOOD') {
                    risk = 'red';
                } else {
                    risk = calcRisk(city.precip);
                }
                
                stats[risk] = (stats[risk] || 0) + 1;
                
                const riskLabel = risk === 'red' ? 'CRÍTICO' : risk === 'orange' ? 'ALTO' : risk === 'yellow' ? 'ATENÇÃO' : 'SEGURO';
                const riskColor = risk === 'red' ? '#ff4444' : risk === 'orange' ? '#ff8800' : risk === 'yellow' ? '#ffcc00' : '#00cc66';
                
                let popupContent = `
                    <div style="min-width:150px">
                        <h3 style="margin:0 5px 0 0;display:inline">${city.name}</h3>
                        ${city.accuweatherAlert ? '<span class="warning-badge">⚠️ ACCUWEATHER</span>' : ''}
                        <p style="margin:3px 0"><b>Risco:</b> <span style="color:${riskColor}">${riskLabel}</span></p>
                `;
                
                if (city.accuweatherAlert) {
                    popupContent += `<p style="margin:3px 0;color:#ff4444;font-size:11px">⚠️ ALERTA DE ENCHENTE!</p><p style="margin:3px 0;color:#888;font-size:10px">Fonte: AccuWeather</p>`;
                } else {
                    popupContent += `<p style="margin:3px 0"><b>Precipitação 24h:</b> ${city.precip}mm</p><p style="margin:3px 0;color:#888;font-size:11px">Baseado em forecast</p>`;
                }
                
                popupContent += '</div>';
                
                L.marker([city.lat, city.lng], { icon: icons[risk] })
                    .bindPopup(popupContent)
                    .addTo(map);
            });
            
            // Update header
            document.getElementById('headerStats').innerHTML = 
                `<span class="stat red">🔴 ${stats.red}</span>` +
                `<span class="stat orange">🟠 ${stats.orange}</span>` +
                `<span class="stat yellow">🟡 ${stats.yellow}</span>` +
                `<span class="stat green">🟢 ${stats.green}</span>`;
            
            // Hide loading
            document.getElementById('loading').style.display = 'none';
            
            console.log('Loaded', cities.length, 'cities, alerts found:', alertsFound);
        }
        
        // Legend
        L.control({ position: 'bottomright' }).onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <h4>🚨 Risco de Enchente</h4>
                <div class="legend-item"><span class="dot red"></span> 🔴 Crítico (>50mm)</div>
                <div class="legend-item"><span class="dot orange"></span> 🟠 Alto (30-50mm)</div>
                <div class="legend-item"><span class="dot yellow"></span> 🟡 Atenção (10-30mm)</div>
                <div class="legend-item"><span class="dot green"></span> 🟢 Seguro (<10mm)</div>
                <div style="margin-top:8px;color:#ff4444;font-size:10px">⚠️ AccuWeather = Alerta oficial</div>
            `;
            return div;
        }.addTo(map);
        
        init();
    </script>
</body>
</html>
