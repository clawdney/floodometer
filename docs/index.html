<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌧️ Floodometer Brazil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #fff; }
        
        header { background: #1a1a2e; padding: 10px 15px; border-bottom: 2px solid #e94560; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 1.1rem; font-weight: bold; }
        .header-stats { display: flex; gap: 8px; font-size: 0.75rem; flex-wrap: wrap; }
        .stat { padding: 3px 8px; border-radius: 12px; background: rgba(255,255,255,0.1); }
        .stat.red { background: rgba(255,68,68,0.2); color: #ff4444; }
        .stat.orange { background: rgba(255,136,0,0.2); color: #ff8800; }
        .stat.yellow { background: rgba(255,204,0,0.2); color: #ffcc00; }
        .stat.green { background: rgba(0,204,102,0.2); color: #00cc66; }
        
        .main-container { display: flex; height: calc(100vh - 50px); }
        #map { flex: 1; height: 100%; }
        
        /* News Panel */
        .news-panel {
            width: 320px;
            background: #1a1a2e;
            border-left: 1px solid #333;
            overflow-y: auto;
            padding: 10px;
        }
        .news-panel h3 {
            color: #e94560;
            font-size: 0.9rem;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
        .news-item {
            background: #16213e;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 3px solid #ff4444;
        }
        .news-city {
            font-weight: bold;
            font-size: 0.85rem;
            color: #ff4444;
            margin-bottom: 5px;
        }
        .news-title {
            font-size: 0.75rem;
            color: #ccc;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .news-link {
            display: inline-block;
            font-size: 0.7rem;
            color: #4da6ff;
            text-decoration: none;
            background: rgba(77,166,255,0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }
        .news-link:hover { background: rgba(77,166,255,0.2); }
        
        .legend { background: rgba(26,26,46,0.95); padding: 10px; border-radius: 8px; border: 1px solid #444; font-size: 0.75rem; }
        .legend h4 { margin-bottom: 5px; color: #e94560; }
        .legend-item { display: flex; align-items: center; gap: 5px; margin: 3px 0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.red { background: #ff4444; }
        .dot.orange { background: #ff8800; }
        .dot.yellow { background: #ffcc00; }
        .dot.green { background: #00cc66; }
        
        .warning-badge { background: #ff4444; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; }
        
        #last-updated { font-size: 0.7rem; color: #888; margin-left: 10px; }
        
        /* Mobile */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            #map { height: 60vh; }
            .news-panel { width: 100%; height: 40vh; border-left: none; border-top: 1px solid #333; }
            header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
            .main-container { margin-top: 50px; }
        }
        
        @media (max-width: 500px) {
            .news-panel { display: none; }
            #map { height: calc(100vh - 50px); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🌧️ Floodometer <span id="last-updated"></span></div>
        <div class="header-stats" id="headerStats">
            <span class="stat red">🔴 0</span>
            <span class="stat orange">🟠 0</span>
            <span class="stat yellow">🟡 0</span>
            <span class="stat green">🟢 0</span>
        </div>
    </header>
    
    <div class="main-container">
        <div id="map"></div>
        <div class="news-panel" id="newsPanel">
            <h3>📰 Últimas Notícias</h3>
            <div id="newsList"></div>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-14.235, -51.925], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(map);
        
        // Icons
        const icons = {
            red: L.divIcon({ html: '<div style="width:20px;height:20px;background:#ff4444;border-radius:50%;box-shadow:0 0 12px #ff4444;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:bold">!</div>', iconSize: [20, 20], iconAnchor: [10, 10] }),
            orange: L.divIcon({ html: '<div style="width:18px;height:18px;background:#ff8800;border-radius:50%;box-shadow:0 0 10px #ff8800;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:bold">!</div>', iconSize: [18, 18], iconAnchor: [9, 9] }),
            yellow: L.divIcon({ html: '<div style="width:14px;height:14px;background:#ffcc00;border-radius:50%;box-shadow:0 0 8px #ffcc00"></div>', iconSize: [14, 14], iconAnchor: [7, 7] }),
            green: L.divIcon({ html: '<div style="width:12px;height:12px;background:#00cc66;border-radius:50%;box-shadow:0 0 6px #00cc66"></div>', iconSize: [12, 12], iconAnchor: [6, 6] })
        };
        
        function calcRisk(precipMm) {
            if (precipMm > 50) return 'red';
            if (precipMm > 30) return 'orange';
            if (precipMm > 10) return 'yellow';
            return 'green';
        }
        
        // Default precipitation (from Open-Meteo) as fallback
        const defaultPrecip = {
            "Porto Alegre": 6.8, "Canoas": 4.4, "Lajeado": 8.2,
            "Rio de Janeiro": 4.4, "Niterói": 0.0,
            "São Paulo": 5.5, "Campinas": 12.7,
            "Belo Horizonte": 0.6, "Curitiba": 0.2,
            "Recife": 1.3, "Salvador": 2.1, "Fortaleza": 0.0,
            "Manaus": 13.1, "Brasília": 0.5, "Vitória": 2.1,
            "Goiânia": 1.2, "Natal": 0.0, "Belém": 0.0,
            "Florianópolis": 0.5, "Blumenau": 7.7,
            "Juiz de Fora": 5.3, "Ubá": 2.1, "Rio das Ostras": 0.5,
            "Mariana": 7.4, "Carangola": 2.6, "Barra do Piraí": 1.2, "Volta Redonda": 3.4,
            "Petrópolis": 1.5, "Teresópolis": 2.0, "Nova Friburgo": 1.8, "Silva Jardim": 0.9
        };
        
        // Normalize city name for lookup
        function normalizeCity(name) {
            return name.toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z]/g, '');
        }
        
        async function init() {
            let stats = { red: 0, orange: 0, yellow: 0, green: 0 };
            let floodCities = [];
            
            // Fetch alerts
            let alertsData = { cities: [] };
            try {
                const resp = await fetch('alerts.json');
                alertsData = await resp.json();
                if (alertsData.timestamp) {
                    const date = new Date(alertsData.timestamp);
                    document.getElementById('last-updated').textContent = '(atualizado ' + date.toLocaleTimeString('pt-BR') + ')';
                }
            } catch (e) {
                console.error('Error loading alerts:', e);
            }
            
            // Create lookup
            const alertsMap = {};
            alertsData.cities.forEach(c => {
                const name = c.name.replace(/\\u([0-9a-f]{4})/gi, (m, g) => String.fromCharCode(parseInt(g, 16)));
                alertsMap[name] = c;
            });
            
            // Render markers
            Object.keys(alertsMap).forEach(cityName => {
                const city = alertsMap[cityName];
                const hasFloodAlert = city.accuweatherAlert?.type === 'FLOOD';
                const hasAlert = city.accuweatherAlert?.hasAlerts;
                
                let risk = hasFloodAlert ? 'red' : (hasAlert ? 'orange' : 'green');
                stats[risk] = (stats[risk] || 0) + 1;
                
                if (hasFloodAlert) {
                    floodCities.push(city);
                }
                
                const riskLabel = risk === 'red' ? 'CRÍTICO' : risk === 'orange' ? 'ALTO' : risk === 'yellow' ? 'ATENÇÃO' : 'SEGURO';
                const riskColor = risk === 'red' ? '#ff4444' : risk === 'orange' ? '#ff8800' : risk === 'yellow' ? '#ffcc00' : '#00cc66';
                
                // Get precipitation
                const precip = defaultPrecip[cityName] || 0;
                const alertType = city.accuweatherAlert?.type || null;
                
                let popupContent = `
                    <div style="min-width:150px">
                        <h3 style="margin:0 5px 0 0;display:inline">${cityName}</h3>
                        ${hasFloodAlert ? '<span class="warning-badge">⚠️ ENCHENTE</span>' : ''}
                        <p style="margin:3px 0"><b>Risco:</b> <span style="color:${riskColor}">${riskLabel}</span></p>
                        <p style="margin:3px 0"><b>Precipitação:</b> ${precip}mm</p>
                `;
                
                if (alertType) {
                    const alertLabel = alertType === 'FLOOD' ? '🚨 ENCHENTE' : alertType === 'OTHER' ? '⚠️ AVISO METEOROLÓGICO' : '';
                    popupContent += `<p style="margin:3px 0;color:#ff8800;font-size:11px">${alertLabel}</p>`;
                }
                
                if (hasFloodAlert && city.news && city.news.length > 0) {
                    popupContent += `<p style="margin:3px 0;color:#888;font-size:11px">📰 ${city.news.length} notícias</p>`;
                }
                
                popupContent += '</div>';
                
                const icon = icons[risk] || icons.green;
                L.marker([city.lat, city.lng], { icon: icon })
                    .bindPopup(popupContent)
                    .addTo(map);
            });
            
            // Update header
            document.getElementById('headerStats').innerHTML = 
                `<span class="stat red">🔴 ${stats.red}</span>` +
                `<span class="stat orange">🟠 ${stats.orange}</span>` +
                `<span class="stat yellow">🟡 ${stats.yellow}</span>` +
                `<span class="stat green">🟢 ${stats.green}</span>`;
            
            // Render news panel
            renderNews(floodCities);
            
            console.log('Loaded', Object.keys(alertsMap).length, 'cities');
        }
        
        function renderNews(floodCities) {
            const newsList = document.getElementById('newsList');
            
            // Sort by number of news
            floodCities.sort((a, b) => (b.news?.length || 0) - (a.news?.length || 0));
            
            let html = '';
            floodCities.forEach(city => {
                if (city.news && city.news.length > 0) {
                    html += `
                        <div class="news-item">
                            <div class="news-city">🔴 ${city.name}</div>
                            ${city.news.slice(0, 2).map(article => `
                                <div class="news-title">${article.title}</div>
                                <a href="${article.url}" target="_blank" class="news-link">Ver notícia →</a>
                            `).join('')}
                        </div>
                    `;
                }
            });
            
            if (!html) {
                html = '<p style="color:#666;font-size:0.8rem;text-align:center;padding:20px">Nenhuma notícia recente encontrada</p>';
            }
            
            newsList.innerHTML = html;
        }
        
        // Legend
        const legendControl = L.control({ position: 'bottomright' });
        legendControl.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <h4>🚨 Risco de Enchente</h4>
                <div class="legend-item"><span class="dot red"></span> 🔴 Crítico (Alerta)</div>
                <div class="legend-item"><span class="dot orange"></span> 🟠 Alto (Alerta)</div>
                <div class="legend-item"><span class="dot yellow"></span> 🟡 Atenção</div>
                <div class="legend-item"><span class="dot green"></span> 🟢 Seguro</div>
            `;
            return div;
        };
        legendControl.addTo(map);
        
        init();
    </script>
</body>
</html>
