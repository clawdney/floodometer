<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floodometer Brazil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-dark: #0a0a0a;
            --bg-panel: #1a1a2e;
            --bg-card: #16213e;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --text: #fff;
            --text-dim: #aaa;
            --risk-red: #e94560;
            --risk-yellow: #f4d03f;
            --risk-green: #2ecc71;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, var(--bg-panel) 0%, var(--bg-card) 100%);
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            z-index: 1000;
            position: relative;
        }
        
        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .logo-icon {
            font-size: 1.5rem;
        }
        
        .header-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
        }
        
        .stat {
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
        }
        
        .stat.red { color: var(--risk-red); border: 1px solid var(--risk-red); }
        .stat.yellow { color: var(--risk-yellow); border: 1px solid var(--risk-yellow); }
        .stat.green { color: var(--risk-green); border: 1px solid var(--risk-green); }
        
        .container {
            display: flex;
            height: calc(100vh - 55px);
        }
        
        .sidebar {
            width: 350px;
            background: var(--bg-panel);
            border-right: 1px solid #333;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .breadcrumb {
            padding: 1rem;
            background: var(--bg-card);
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        
        .breadcrumb-item {
            color: var(--text-dim);
            cursor: pointer;
        }
        
        .breadcrumb-item:hover {
            color: var(--accent);
        }
        
        .breadcrumb-item.current {
            color: var(--text);
            font-weight: bold;
            cursor: default;
        }
        
        .breadcrumb-sep {
            color: #555;
        }
        
        .location-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        
        .location-item {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 0.8rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        
        .location-item:hover {
            background: #1e2a4a;
            transform: translateX(4px);
        }
        
        .location-item.red { border-left-color: var(--risk-red); }
        .location-item.yellow { border-left-color: var(--risk-yellow); }
        .location-item.green { border-left-color: var(--risk-green); }
        
        .location-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .location-name {
            font-weight: 600;
        }
        
        .risk-badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        .risk-badge.red { background: rgba(233, 69, 96, 0.2); color: var(--risk-red); }
        .risk-badge.yellow { background: rgba(244, 208, 63, 0.2); color: var(--risk-yellow); }
        .risk-badge.green { background: rgba(46, 204, 113, 0.2); color: var(--risk-green); }
        
        .location-meta {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.3rem;
        }
        
        .incident-badge {
            display: inline-block;
            background: rgba(233, 69, 96, 0.15);
            color: var(--risk-red);
            font-size: 0.7rem;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            margin-top: 0.3rem;
        }
        
        .map-container {
            flex: 1;
            position: relative;
        }
        
        #map {
            height: 100%;
            width: 100%;
        }
        
        .legend {
            background: rgba(26, 26, 46, 0.95);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #333;
        }
        
        .legend h4 {
            margin-bottom: 0.5rem;
            color: var(--accent);
            font-size: 0.9rem;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.3rem 0;
            font-size: 0.85rem;
        }
        
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .dot.red { background: var(--risk-red); box-shadow: 0 0 6px var(--risk-red); }
        .dot.yellow { background: var(--risk-yellow); box-shadow: 0 0 6px var(--risk-yellow); }
        .dot.green { background: var(--risk-green); box-shadow: 0 0 6px var(--risk-green); }
        
        .info-panel {
            background: rgba(26, 26, 46, 0.95);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #333;
            max-width: 280px;
        }
        
        .info-panel h3 {
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }
        
        .info-panel p {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.4;
        }
        
        .events-section {
            padding: 1rem;
            border-top: 1px solid #333;
            background: var(--bg-card);
        }
        
        .events-title {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .event-item {
            font-size: 0.8rem;
            padding: 0.5rem;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            margin-bottom: 0.3rem;
            border-left: 3px solid var(--risk-red);
        }
        
        .event-date {
            color: var(--text-dim);
            font-size: 0.7rem;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                z-index: 500;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-icon">🌊</span>
            <span>Floodometer Brazil</span>
        </div>
        <div class="header-stats" id="headerStats">
            <!-- Stats populated by JS -->
        </div>
    </header>
    
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item current" data-level="brazil">Brazil</span>
            </div>
            
            <div class="location-list" id="locationList">
                <!-- Populated by JS -->
            </div>
            
            <div class="events-section">
                <div class="events-title">📰 Recent Incidents</div>
                <div id="eventsList"></div>
            </div>
        </aside>
        
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([-14.235, -51.925], 4);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, CartoDB',
            maxZoom: 19
        }).addTo(map);
        
        // State data
        let floodData = null;
        let currentLevel = 'brazil'; // brazil, state, city
        let currentState = null;
        let currentCity = null;
        
        // Icons
        const icons = {
            red: L.divIcon({ className: 'custom-marker', html: '<div class="dot red"></div>', iconSize: [14, 14], iconAnchor: [7, 7] }),
            yellow: L.divIcon({ className: 'custom-marker', html: '<div class="dot yellow"></div>', iconSize: [14, 14], iconAnchor: [7, 7] }),
            green: L.divIcon({ className: 'custom-marker', html: '<div class="dot green"></div>', iconSize: [14, 14], iconAnchor: [7, 7] })
        };
        
        let markersLayer = L.layerGroup().addTo(map);
        
        // Load data
        async function loadData() {
            const response = await fetch('data.json');
            floodData = await response.json();
            renderBrazil();
            renderRecentEvents();
            updateStats();
        }
        
        function updateStats() {
            let red = 0, yellow = 0, green = 0;
            
            Object.values(floodData.states).forEach(state => {
                Object.values(state.cities || {}).forEach(city => {
                    const risk = city.risk || 'green';
                    if (risk === 'red') red++;
                    else if (risk === 'yellow') yellow++;
                    else green++;
                    
                    (city.neighborhoods || []).forEach(n => {
                        if (n.risk === 'red') red++;
                        else if (n.risk === 'yellow') yellow++;
                        else green++;
                    });
                });
            });
            
            document.getElementById('headerStats').innerHTML = `
                <span class="stat red">🔴 ${red}</span>
                <span class="stat yellow">🟡 ${yellow}</span>
                <span class="stat green">🟢 ${green}</span>
            `;
        }
        
        function renderBreadcrumb(level, name) {
            const bc = document.getElementById('breadcrumb');
            bc.innerHTML = `
                <span class="breadcrumb-item" onclick="goToLevel('brazil')">Brazil</span>
            `;
            
            if (level === 'state' || level === 'city') {
                bc.innerHTML += ` <span class="breadcrumb-sep">›</span> <span class="breadcrumb-item current">${name}</span>`;
            }
            
            if (level === 'city') {
                bc.innerHTML += ` <span class="breadcrumb-sep">›</span> <span class="breadcrumb-item current">${name}</span>`;
            }
        }
        
        function renderBrazil() {
            currentLevel = 'brazil';
            currentState = null;
            currentCity = null;
            renderBreadcrumb('brazil');
            
            const list = document.getElementById('locationList');
            list.innerHTML = '';
            
            // Clear markers
            markersLayer.clearLayers();
            
            Object.entries(floodData.states).forEach(([code, state]) => {
                const risk = state.risk || 'green';
                
                const item = document.createElement('div');
                item.className = `location-item ${risk}`;
                item.innerHTML = `
                    <div class="location-header">
                        <span class="location-name">${state.name}</span>
                        <span class="risk-badge ${risk}">${risk}</span>
                    </div>
                    <div class="location-meta">${Object.keys(state.cities || {}).length} cities</div>
                `;
                item.onclick = () => renderState(code);
                list.appendChild(item);
                
                // Add state capital marker
                const capital = state.cities[Object.keys(state.cities)[0]];
                if (capital) {
                    L.marker([capital.lat, capital.lng], { icon: icons[risk] })
                        .bindPopup(`<strong>${state.name}</strong><br>Risk: ${risk}`)
                        .addTo(markersLayer);
                }
            });
            
            map.setView([-14.235, -51.925], 4);
        }
        
        function renderState(stateCode) {
            const state = floodData.states[stateCode];
            currentLevel = 'state';
            currentState = stateCode;
            currentCity = null;
            renderBreadcrumb('state', state.name);
            
            const list = document.getElementById('locationList');
            list.innerHTML = '';
            
            markersLayer.clearLayers();
            
            Object.entries(state.cities).forEach(([code, city]) => {
                const risk = city.risk || 'green';
                const hasIncidents = city.recentIncidents && city.recentIncidents.length > 0;
                
                const item = document.createElement('div');
                item.className = `location-item ${risk}`;
                item.innerHTML = `
                    <div class="location-header">
                        <span class="location-name">${city.name}</span>
                        <span class="risk-badge ${risk}">${risk}</span>
                    </div>
                    <div class="location-meta">Pop: ${(city.population || 0).toLocaleString()}</div>
                    ${hasIncidents ? `<span class="incident-badge">⚠️ Recent incident</span>` : ''}
                `;
                item.onclick = () => renderCity(stateCode, code);
                list.appendChild(item);
                
                L.marker([city.lat, city.lng], { icon: icons[risk] })
                    .bindPopup(`<strong>${city.name}</strong><br>Risk: ${risk}`)
                    .addTo(markersLayer);
            });
            
            // Fit bounds to state cities
            const group = L.featureGroup(markersLayer.getLayers());
            if (group.getLayers().length > 0) {
                map.fitBounds(group.getBounds().pad(0.2));
            }
        }
        
        function renderCity(stateCode, cityCode) {
            const state = floodData.states[stateCode];
            const city = state.cities[cityCode];
            currentLevel = 'city';
            currentState = stateCode;
            currentCity = cityCode;
            renderBreadcrumb('city', city.name);
            
            const list = document.getElementById('locationList');
            list.innerHTML = '';
            
            markersLayer.clearLayers();
            
            // Add city marker
            L.marker([city.lat, city.lng], { icon: icons[city.risk] })
                .bindPopup(`<strong>${city.name}</strong><br>Risk: ${city.risk}`)
                .addTo(markersLayer);
            
            // Render neighborhoods
            if (city.neighborhoods && city.neighborhoods.length > 0) {
                city.neighborhoods.forEach(n => {
                    const risk = n.risk || 'green';
                    
                    const item = document.createElement('div');
                    item.className = `location-item ${risk}`;
                    item.innerHTML = `
                        <div class="location-header">
                            <span class="location-name">${n.name}</span>
                            <span class="risk-badge ${risk}">${risk}</span>
                        </div>
                    `;
                    list.appendChild(item);
                    
                    L.marker([n.lat, n.lng], { icon: icons[risk] })
                        .bindPopup(`<strong>${n.name}</strong><br>${city.name}<br>Risk: ${risk}`)
                        .addTo(markersLayer);
                });
                
                const group = L.featureGroup(markersLayer.getLayers());
                map.fitBounds(group.getBounds().pad(0.2));
            } else {
                // No neighborhoods, show city info
                const item = document.createElement('div');
                item.className = `location-item ${city.risk}`;
                item.innerHTML = `
                    <div class="location-header">
                        <span class="location-name">${city.name}</span>
                        <span class="risk-badge ${city.risk}">${city.risk}</span>
                    </div>
                    <div class="location-meta">
                        <p>Population: ${(city.population || 0).toLocaleString()}</p>
                        ${city.recentIncidents && city.recentIncidents.length > 0 ? `
                            <p style="margin-top:0.5rem; color:var(--risk-red)">Recent Incidents:</p>
                            ${city.recentIncidents.map(i => `<p style="margin:0.2rem 0; font-size:0.75rem">📅 ${i.date}: ${i.description}</p>`).join('')}
                        ` : ''}
                    </div>
                `;
                list.appendChild(item);
                
                map.setView([city.lat, city.lng], 10);
            }
        }
        
        function goToLevel(level) {
            if (level === 'brazil') renderBrazil();
        }
        
        function renderRecentEvents() {
            const container = document.getElementById('eventsList');
            const events = floodData.recentEvents || [];
            
            if (events.length === 0) {
                container.innerHTML = '<p style="font-size:0.8rem;color:#666">No recent incidents</p>';
                return;
            }
            
            container.innerHTML = events.slice(0, 5).map(e => `
                <div class="event-item">
                    <div class="event-date">${e.date}</div>
                    <div>${e.location}</div>
                    <div style="color:var(--text-dim);font-size:0.75rem">${e.description}</div>
                </div>
            `).join('');
        }
        
        // Legend
        L.control({ position: 'bottomright' }).onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <h4>Flood Risk</h4>
                <div class="legend-item"><span class="dot red"></span> High (Critical)</div>
                <div class="legend-item"><span class="dot yellow"></span> Medium (Warning)</div>
                <div class="legend-item"><span class="dot green"></span> Low (Safe)</div>
            `;
            return div;
        }.addTo(map);
        
        // Info panel
        L.control({ position: 'topleft' }).onAdd = function() {
            const div = L.DomUtil.create('div', 'info-panel');
            div.innerHTML = `
                <h3>🌊 Floodometer</h3>
                <p>Brazil flood risk monitoring system. Click on states/cities to explore.</p>
                <p style="margin-top:0.5rem;font-size:0.75rem;color:#666">Data: ${floodData?.metadata?.lastUpdated || 'Loading...'}</p>
            `;
            return div;
        }.addTo(map);
        
        // Initialize
        loadData();
    </script>
</body>
</html>
