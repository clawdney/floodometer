<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌧️ Floodometer Brazil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #fff; }
        
        header { background: #1a1a2e; padding: 10px 15px; border-bottom: 2px solid #e94560; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 1.1rem; font-weight: bold; }
        .header-stats { display: flex; gap: 8px; font-size: 0.75rem; flex-wrap: wrap; }
        .stat { padding: 3px 8px; border-radius: 12px; background: rgba(255,255,255,0.1); }
        .stat.red { background: rgba(255,68,68,0.2); color: #ff4444; }
        .stat.orange { background: rgba(255,136,0,0.2); color: #ff8800; }
        .stat.yellow { background: rgba(255,204,0,0.2); color: #ffcc00; }
        .stat.green { background: rgba(0,204,102,0.2); color: #00cc66; }
        
        #map { height: calc(100vh - 50px); width: 100%; }
        
        .legend { background: rgba(26,26,46,0.95); padding: 10px; border-radius: 8px; border: 1px solid #444; font-size: 0.75rem; }
        .legend h4 { margin-bottom: 5px; color: #e94560; }
        .legend-item { display: flex; align-items: center; gap: 5px; margin: 3px 0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.red { background: #ff4444; }
        .dot.orange { background: #ff8800; }
        .dot.yellow { background: #ffcc00; }
        .dot.green { background: #00cc66; }
        
        @media (max-width: 768px) {
            #map { height: 100vh; }
            header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
            #map { margin-top: 50px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🌧️ Floodometer</div>
        <div class="header-stats" id="headerStats">
            <span class="stat red">🔴 0</span>
            <span class="stat orange">🟠 0</span>
            <span class="stat yellow">🟡 0</span>
            <span class="stat green">🟢 0</span>
        </div>
    </header>
    
    <div id="map"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-14.235, -51.925], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(map);
        
        // Icons with labels
        const icons = {
            red: L.divIcon({ 
                html: '<div style="width:20px;height:20px;background:#ff4444;border-radius:50%;box-shadow:0 0 12px #ff4444;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:bold">!</div>', 
                iconSize: [20, 20], iconAnchor: [10, 10] 
            }),
            orange: L.divIcon({ 
                html: '<div style="width:18px;height:18px;background:#ff8800;border-radius:50%;box-shadow:0 0 10px #ff8800;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:bold">!</div>', 
                iconSize: [18, 18], iconAnchor: [9, 9] 
            }),
            yellow: L.divIcon({ 
                html: '<div style="width:14px;height:14px;background:#ffcc00;border-radius:50%;box-shadow:0 0 8px #ffcc00"></div>', 
                iconSize: [14, 14], iconAnchor: [7, 7] 
            }),
            green: L.divIcon({ 
                html: '<div style="width:12px;height:12px;background:#00cc66;border-radius:50%;box-shadow:0 0 6px #00cc66"></div>', 
                iconSize: [12, 12], iconAnchor: [6, 6] 
            })
        };
        
        // Cities data with forecast
        const cities = [
            // RS - Recent floods
            { name: "Porto Alegre", lat: -30.0346, lng: -51.2177, risk: "red", precip: "6.8mm", forecast: "24h: 6.8mm", state: "RS" },
            { name: "Canoas", lat: -29.9177, lng: -51.1836, risk: "red", precip: "4.4mm", forecast: "24h: 4.4mm", state: "RS" },
            { name: "Lajeado", lat: -29.1167, lng: -51.9667, risk: "red", precip: "8.2mm", forecast: "24h: 8.2mm", state: "RS" },
            
            // RJ - High risk
            { name: "Rio de Janeiro", lat: -22.9068, lng: -43.1729, risk: "red", precip: "12.1mm", forecast: "24h: 12.1mm", state: "RJ" },
            { name: "Niterói", lat: -22.8833, lng: -43.1036, risk: "yellow", precip: "2.1mm", forecast: "24h: 2.1mm", state: "RJ" },
            { name: "Cachoeiro de Itapemirim", lat: -20.85, lng: -41.1, risk: "yellow", precip: "7.9mm", forecast: "24h: 7.9mm", state: "RJ" },
            
            // MG - Recent incidents
            { name: "Belo Horizonte", lat: -19.9167, lng: -43.9345, risk: "yellow", precip: "0.6mm", forecast: "24h: 0.6mm", state: "MG" },
            { name: "Juiz de Fora", lat: -21.7617, lng: -43.3217, risk: "yellow", precip: "5.3mm", forecast: "24h: 5.3mm", state: "MG" },
            { name: "Mariana", lat: -20.3775, lng: -43.4168, risk: "yellow", precip: "7.4mm", forecast: "24h: 7.4mm", state: "MG" },
            { name: "Carangola", lat: -20.7331, lng: -42.4831, risk: "red", precip: "2.6mm", forecast: "24h: 2.6mm", state: "MG" },
            
            // SP
            { name: "São Paulo", lat: -23.5505, lng: -46.6333, risk: "orange", precip: "5.5mm", forecast: "24h: 5.5mm ⚠️", state: "SP" },
            { name: "Campinas", lat: -22.9099, lng: -47.0626, risk: "yellow", precip: "12.7mm", forecast: "24h: 12.7mm", state: "SP" },
            
            // SC
            { name: "Florianópolis", lat: -27.5954, lng: -48.548, risk: "green", precip: "0.5mm", forecast: "24h: 0.5mm", state: "SC" },
            { name: "Blumenau", lat: -26.9194, lng: -49.0661, risk: "yellow", precip: "7.7mm", forecast: "24h: 7.7mm", state: "SC" },
            
            // PE
            { name: "Recife", lat: -8.0476, lng: -34.877, risk: "yellow", precip: "1.3mm", forecast: "24h: 1.3mm", state: "PE" },
            
            // BA
            { name: "Salvador", lat: -12.9714, lng: -38.5014, risk: "green", precip: "2.1mm", forecast: "24h: 2.1mm", state: "BA" },
            { name: "Ilhéus", lat: -14.7936, lng: -39.0467, risk: "yellow", precip: "4.5mm", forecast: "24h: 4.5mm", state: "BA" },
            
            // PA
            { name: "Belém", lat: -1.4558, lng: -48.5039, risk: "yellow", precip: "8.9mm", forecast: "24h: 8.9mm", state: "PA" },
            
            // Other
            { name: "Curitiba", lat: -25.4284, lng: -49.2733, risk: "yellow", precip: "0.2mm", forecast: "24h: 0.2mm", state: "PR" },
            { name: "Fortaleza", lat: -3.7172, lng: -38.5433, risk: "green", precip: "0.0mm", forecast: "24h: 0.0mm", state: "CE" }
        ];
        
        // Render markers
        let stats = { red: 0, orange: 0, yellow: 0, green: 0 };
        
        cities.forEach(city => {
            stats[city.risk] = (stats[city.risk] || 0) + 1;
            
            const icon = icons[city.risk] || icons.green;
            const riskLabel = city.risk === 'red' ? 'CRÍTICO' : city.risk === 'orange' ? 'ALTO' : city.risk === 'yellow' ? 'ATENÇÃO' : 'SEGURO';
            
            L.marker([city.lat, city.lng], { icon: icon })
                .bindPopup(`
                    <div style="min-width:150px">
                        <h3 style="margin:0 0 5px;color:#e94560">${city.name}</h3>
                        <p style="margin:3px 0"><b>Estado:</b> ${city.state}</p>
                        <p style="margin:3px 0"><b>Risco:</b> <span style="color:${city.risk==='red'?'#ff4444':city.risk==='orange'?'#ff8800':city.risk==='yellow'?'#ffcc00':'#00cc66'}">${riskLabel}</span></p>
                        <p style="margin:3px 0"><b>Precipitação:</b> ${city.precip}</p>
                        <p style="margin:3px 0;color:#888;font-size:11px">${city.forecast}</p>
                    </div>
                `)
                .addTo(map);
        });
        
        // Update header
        document.getElementById('headerStats').innerHTML = 
            `<span class="stat red">🔴 ${stats.red}</span>` +
            `<span class="stat orange">🟠 ${stats.orange}</span>` +
            `<span class="stat yellow">🟡 ${stats.yellow}</span>` +
            `<span class="stat green">🟢 ${stats.green}</span>`;
        
        // Legend
        L.control({ position: 'bottomright' }).onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<h4>🚨 Risco de Enchente</h4><div class="legend-item"><span class="dot red"></span> 🔴 Crítico</div><div class="legend-item"><span class="dot orange"></span> 🟠 Alto</div><div class="legend-item"><span class="dot yellow"></span> 🟡 Atenção</div><div class="legend-item"><span class="dot green"></span> 🟢 Seguro</div>';
            return div;
        }.addTo(map);
        
        console.log('Loaded', cities.length, 'cities with forecast');
    </script>
</body>
</html>
